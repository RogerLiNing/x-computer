# MySQL 8 供 x-computer 使用（DATABASE_TYPE=mysql）
# 使用：在项目根目录执行 docker compose -f docker/mysql/docker-compose.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: x-computer-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: xcomputer
      MYSQL_DATABASE: x_computer
      MYSQL_USER: xcom
      MYSQL_PASSWORD: xcomputer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pxcomputer"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  mysql_data:
