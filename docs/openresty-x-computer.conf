# X-Computer OpenResty 配置
# 前端: /apps/x-computer-staging/frontend/dist
# 后端: localhost:4000
# 复制到 OpenResty vhost 目录后: openresty -t && openresty -s reload

server {
    listen 80;
    server_name x-computer.example.com;
    index index.html index.htm default.htm default.html;
    root /apps/x-computer-staging/frontend/dist;

    # SPA 前端
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 代理（含 SSE 流式输出）
    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        proxy_cache off;
    }

    # WebSocket 代理
    location /ws {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    location ~* \.(gif|jpg|jpeg|png|bmp|swf|ico|webp)$ {
        expires 30d;
        access_log off;
    }

    location ~* \.(js|css|woff2?|ttf|svg)$ {
        expires 12h;
        access_log off;
    }

    access_log  /var/log/openresty/x-computer.access.log;
    error_log   /var/log/openresty/x-computer.error.log;
}
